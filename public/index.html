<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/style_index.css" />

    <title>Proyecto para Edutin: Buscador Google | Odra Sanchez</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="nav-links">
          <a href="./search-images.html">Imágenes</a>
          <a href="./advanced-search.html">Avanzada</a>
        </div>

        <button
          class="menu-button"
          type="button"
          aria-label="Aplicaciones de Google (decorativo)">
          <img
            src="./assets/img/menu-grid-svgrepo-com.svg"
            alt=""
            aria-hidden="true"/>
        </button>
      </nav>
    </header>

    <main>
      <form action="https://www.google.com/search" method="get" id="index">
        <img
          class="logo"
          src="https://www.google.com/logos/doodles/2026/world-cup-2026-mexico-match-day-june-11-6753651837111090.2-2x.png"
          alt="Doodle Mexico World Cup 2026"
        />
        <input type="text" name="q" placeholder="Buscar en Google" required />

        <div class="botones">
          <button type="submit">Buscar</button>
          <button type="submit" name="btnI" value="1">
            Me siento afortunado
          </button>
        </div>
      </form>
    </main>
  </body>
</html>
